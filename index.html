<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Custom Contest Generator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>LeetCode Contest Generator</h1>

        <div class="input-container">
            <label for="duration">Contest Duration (minutes):</label>
            <input type="number" id="duration" value="60" min="1">
        </div>

        <div class="input-container">
            <label for="tag-select">Topic:</label>
            <select id="tag-select">
                <option value="None" selected>None</option>
                <option value="sliding-window">Sliding Window</option>
                <option value="two-pointers">Two Pointers</option>
                <option value="binary-search">Binary Search</option>
                <option value="graph">Graph</option>
                <option value="tree">Tree</option>
                <option value="dynamic-programming">Dynamic Programming</option>
                <option value="heap-priority-queue">Heap</option>
                <option value="greedy">Greedy</option>
                <option value="backtracking">Backtracking</option>
            </select>
        </div>

        <div class="input-container">
            <label for="pattern-select">Pattern:</label>
            <select id="pattern-select">
                <option value="None" selected>None</option>
                <option value="oizxjoit">Blind 75</option>
                <option value="rr2ss0g5">Neetcode 150</option>
                <option value="rabvlt31">Grind 169</option>
                <option value="rab78cw1">Grind 75</option>
                <option value="datzfo11"> Sliding Window</option>
                <option value="datb1qjh"> Two pointer</option>
                <option value="da8hkp37"> Fast and slow pointer</option>
                <option value="da8x8aa1"> Merge Intervals</option>
                <option value="da858yg2"> Cyclic sort</option>
                <option value="da89ctz7"> inplace reversal</option>
                <option value="da8osnc6"> Tree BFS</option>
                <option value="da8p59fm"> Tree DFS</option>
                <option value="e5xnbz4r"> Tree Mix</option>
                <option value="nz3bkg5r"> Graph Mix</option>
                <option value="da8m9qd2"> Two Heaps</option>
                <option value="da8iie3m"> DP Mix</option>  
            </select>
        </div>

        <button class="start-button">Start Contest</button>

        <div class="question-list"></div>

        <div class="timer hidden">
            <div>Time Remaining: <span id="timer">00:00</span></div>
        </div>

        <button class="regenerate-button hidden">Regenerate Contest</button>
        <button class="end-button hidden">End Contest</button>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
